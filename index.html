  <body>
    <!-- NATIVE VANILLA JS CURSOR -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <style>
      :root {
        --cursor-hex: #ccff00;
        --cursor-rgb: 204, 255, 0;
      }
      html[data-theme="light"] {
        --cursor-hex: #c9920a;
        --cursor-rgb: 201, 146, 10;
      }
      #cursor {
        position: fixed;
        width: 10px;
        height: 10px;
        background: var(--cursor-hex);
        border-radius: 50%;
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%);
        transition: transform 0.1s;
        box-shadow: 0 0 20px rgba(var(--cursor-rgb), 0.6);
      }
      #cursor-ring {
        position: fixed;
        width: 32px;
        height: 32px;
        border: 1.5px solid rgba(var(--cursor-rgb), 0.6);
        border-radius: 50%;
        pointer-events: none;
        z-index: 99998;
        transform: translate(-50%, -50%);
        transition: transform 0.2s ease, border-color 0.2s ease;
      }
      @media (max-width: 1024px) {
        #cursor, #cursor-ring { display: none !important; }
      }
    </style>
    <script>
      (function initCursor() {
        const c = document.getElementById('cursor');
        const r = document.getElementById('cursor-ring');
        let mx = window.innerWidth / 2, my = window.innerHeight / 2, rx = mx, ry = my;
        document.addEventListener('mousemove', e => { 
          mx = e.clientX; 
          my = e.clientY; 
          c.style.left = mx + 'px'; 
          c.style.top = my + 'px'; 
        });
        (function animRing() { 
          rx += (mx - rx) * 0.15; 
          ry += (my - ry) * 0.15; 
          r.style.left = rx + 'px'; 
          r.style.top = ry + 'px'; 
          requestAnimationFrame(animRing); 
        })();

        // Hover effect for interactive elements mapped dynamically
        const applyHover = () => {
          document.querySelectorAll('a, button, [onclick], input, textarea, [role="button"]').forEach(el => {
            if (el.dataset.cursorBound) return;
            el.dataset.cursorBound = "true";
            el.addEventListener('mouseenter', () => { 
              c.style.transform = 'translate(-50%,-50%) scale(2.5)'; 
              r.style.transform = 'translate(-50%,-50%) scale(1.5)'; 
            });
            el.addEventListener('mouseleave', () => { 
              c.style.transform = 'translate(-50%,-50%) scale(1)'; 
              r.style.transform = 'translate(-50%,-50%) scale(1)'; 
            });
          });
        };
        window.addEventListener('load', applyHover);
        new MutationObserver(applyHover).observe(document.body, { childList: true, subtree: true });
      })();
    </script>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
